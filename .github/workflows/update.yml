name: Update IA Tracker

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC = 06:00 Brasília
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - run: python -c "from dashboard import generate_html; open('index.html','w',encoding='utf-8').write(generate_html())"

      - name: Commit dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ia_tracker.db index.html
          git commit -m "chore: atualiza dados do tracker" || echo "sem mudanças"
          git push

      - run: mkdir -p _site && cp index.html _site/

      - name: Publica no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
