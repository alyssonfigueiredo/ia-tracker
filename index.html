<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IA Tracker</title>
<style>
  :root {
    --bg: #efe9da; --text: #241f18; --text-dim: #6b6152; --border: #e5dcc3;
    --accent: #c98f1d;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --rounded: ui-rounded, "SF Pro Rounded", var(--sans);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); padding: 28px 20px 64px; }
  .wrap { max-width: 1100px; margin: 0 auto; background: linear-gradient(135deg, #d9d7e2 0%, #f2ecdd 55%, #f6dfa0 100%);
    border-radius: 28px; padding: 28px; }

  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .brand-mark { position: relative; width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    background: color-mix(in srgb, var(--accent) 18%, transparent); display: flex; align-items: center; justify-content: center; }
  .brand-mark::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .brand-mark::after { content: ""; position: absolute; inset: 5px; border: 1.5px solid color-mix(in srgb, var(--accent) 45%, transparent); border-radius: 50%; }
  .intro h1 { font-size: 1.6rem; margin: 0; font-family: var(--rounded); font-weight: 700; letter-spacing: -0.01em; }
  .intro h1 .accent { color: var(--accent); }
  .intro p { margin: 6px 0 20px; color: var(--text-dim); font-size: 0.9rem; }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .search { flex: 1; min-width: 180px; font-family: var(--sans); font-size: 0.86rem; background: #fff;
    border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; color: var(--text); outline: none; }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--text-dim); }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill-btn { font-family: var(--sans); font-size: 0.78rem; font-weight: 600; cursor: pointer; background: #fff;
    border: 1px solid var(--border); color: var(--text-dim); border-radius: 20px; padding: 6px 12px;
    display: flex; align-items: center; gap: 6px; }
  .pill-btn.active { background: var(--accent); color: var(--text); border-color: var(--accent); }
  .pill-btn .n { font-family: var(--mono); opacity: 0.75; }

  .row2 { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .field-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; background: #fff; }
  .seg button { font-family: var(--sans); font-size: 0.78rem; font-weight: 600; background: none; color: var(--text-dim);
    border: none; padding: 6px 14px; cursor: pointer; }
  .seg button.active { background: var(--accent); color: var(--text); }

  .group { margin-bottom: 26px; }
  .group-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; border-bottom: 1px dotted var(--text-dim); padding-bottom: 8px; }
  .group-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .group-count { font-family: var(--mono); font-size: 0.74rem; color: var(--text-dim); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; align-items: start; }

  /* .card (<details>) é só um wrapper "neutro" — precisa ficar livre de transform/filter/backdrop-filter,
     senão vira containing block e quebra o position:fixed do .tile-detail (isso já me mordeu uma vez aqui) */
  .card { position: relative; }

  /* a face compacta é o próprio <summary> — clique nativo do <details> abre/fecha, sem JS de toggle */
  .tile-face-bg { position: relative; background: rgba(255,255,255,0.55); border: 1px solid var(--border); border-radius: 28px;
    padding: 20px 16px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 4px 18px rgba(150,120,40,0.1); cursor: pointer; list-style: none;
    transition: transform .2s, box-shadow .2s, border-color .2s; }
  .tile-face-bg::-webkit-details-marker, .tile-face-bg::marker { display: none; }
  /* único "movimento" no hover — um leve lift, nada de painel abrindo sozinho */
  .tile-face-bg:hover { transform: translateY(-3px); box-shadow: 0 10px 22px rgba(150,120,40,0.16); border-color: var(--accent); }
  .card.top .tile-face-bg { box-shadow: 0 0 0 1.5px var(--accent) inset; }
  details.card[open] .tile-face-bg { border-color: var(--accent); }

  /* fundo escurecido atrás do card aberto */
  .card::before {
    content: ""; position: fixed; inset: 0; background: rgba(30,24,10,0.28); backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 40;
  }
  details.card[open]::before { opacity: 1; }

  .top-flag { position: absolute; top: -1px; right: 16px; background: var(--accent); color: #241f18; font-family: var(--mono);
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 0 0 8px 8px; text-transform: uppercase; }

  .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--accent) 22%, transparent); color: var(--accent); font-family: var(--rounded);
    font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }

  /* nome sozinho na própria linha — é o que faltava espaço quando dividia linha com avatar+score */
  .face-name { width: 100%; font-family: var(--rounded); font-weight: 700; font-size: 0.94rem; margin: 2px 0 0; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .score-chip { font-family: var(--mono); font-weight: 700; font-size: 0.72rem; padding: 3px 9px; border-radius: 999px;
    background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }
  .face-snippet { width: 100%; font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; margin: 2px 0 0;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .face-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; margin-top: 4px; }
  .conf-mini { font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); }

  /* painel de detalhe: nasce em cima do card (mesma posição) e viaja até o centro da tela quando abre —
     translateZ dá a sensação de vir na direção de quem olha, rotateY faz o giro tipo "flip".
     --dx/--dy são calculados no JS a cada abertura (evento "toggle" do <details>). */
  .tile-detail {
    position: fixed; top: 50%; left: 50%; width: min(460px, 88vw); max-height: 78vh; overflow-y: auto;
    background: rgba(255,255,255,0.94); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border); border-radius: 26px; padding: 24px; text-align: left;
    box-shadow: 0 30px 60px rgba(60,45,10,0.28);
    transform: perspective(1400px)
      translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, 0px)))
      translateZ(-380px) rotateY(180deg) scale(0.45);
    opacity: 0; pointer-events: none; z-index: 50;
    transition: transform 1s cubic-bezier(.16,.9,.2,1), opacity .85s ease;
  }
  details.card[open] .tile-detail {
    transform: perspective(1400px) translate(-50%, -50%) translateZ(0) rotateY(0deg) scale(1);
    opacity: 1; pointer-events: auto;
  }

  .detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .detail-head .avatar { width: 44px; height: 44px; font-size: 0.85rem; }
  .detail-head-text { flex: 1; min-width: 0; }
  .detail-name { font-family: var(--rounded); font-weight: 700; font-size: 1.1rem; margin: 0 0 6px; line-height: 1.3; }

  .src-badge { font-family: var(--mono); font-size: 0.64rem; padding: 2px 9px; border-radius: 20px; text-transform: uppercase;
    letter-spacing: 0.03em; }
  .cat-chip { font-family: var(--mono); font-size: 0.62rem; padding: 2px 9px; border-radius: 20px;
    background: color-mix(in srgb, var(--text-dim) 14%, transparent); color: var(--text-dim); }
  .src-github { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
  .src-hn { background: color-mix(in srgb, #b3503f 16%, transparent); color: #b3503f; }
  .src-ph { background: color-mix(in srgb, #5c8a55 16%, transparent); color: #5c8a55; }

  .card-desc { font-size: 0.88rem; color: var(--text-dim); line-height: 1.6; margin: 0 0 12px; }
  .apply { font-size: 0.82rem; line-height: 1.55; margin: 0; }
  .apply b { color: var(--text-dim); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 3px; }

  .card-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-top: 14px; margin-top: 14px; border-top: 1px dotted var(--border); }
  .conf { font-family: var(--mono); font-size: 0.74rem; color: var(--text-dim); }
  .open-link { font-family: var(--sans); font-size: 0.82rem; font-weight: 600; color: var(--accent); text-decoration: none; white-space: nowrap; }
  .open-link:hover { text-decoration: underline; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.86rem; display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="intro">
    <div class="brand">
      <div class="brand-mark"></div>
      <h1><span class="accent">IA</span> Tracker</h1>
    </div>
    <p>9 sinais coletados · GitHub Trending, Hacker News e Product Hunt.</p>
  </div>

  <div class="controls">
    <input class="search" id="search" type="text" placeholder="Buscar por nome...">
    <div class="pills" id="pills">
      <button class="pill-btn active" data-src="all">Todos <span class="n">9</span></button>
      <button class="pill-btn" data-src="GitHub Trending">GitHub <span class="n">2</span></button>
      <button class="pill-btn" data-src="Hacker News">HN <span class="n">7</span></button>
    </div>
  </div>

  <div class="row2">
    <span class="field-label">Agrupar por</span>
    <div class="seg" id="groupSeg">
      <button class="active" data-group="source">Fonte</button>
      <button data-group="category">Categoria</button>
    </div>
  </div>

  <div id="groups"></div>
  <div class="empty" id="empty">Nenhum resultado — tenta outra busca ou fonte.</div>
</div>

<script>
  const DATA = [{"name": "imthenachoman / How-To-Secure-A-Linux-Server", "desc": "Oferece um guia passo a passo e em evolução para hardening e segurança de servidores Linux, cobrindo diversas práticas recomendadas para proteção do sistema.", "url": "https://github.com/imthenachoman/How-To-Secure-A-Linux-Server", "source": "GitHub Trending", "apply": "Configuração inicial de servidor, auditoria de segurança, aprendizado sobre segurança Linux, administradores de sistema, engenheiros DevOps, desenvolvedores que gerenciam infraestrutura", "score": 9.0, "conf": 95.0, "age": "agora", "category": "Segurança"}, {"name": "Why developers are ditching GitHub for Codeberg and self-hosting alternatives", "desc": "Explora as razões pelas quais desenvolvedores estão migrando do GitHub para alternativas como Codeberg e soluções de auto-hospedagem, destacando questões de controle de dados e princípios open-source.", "url": "https://www.howtogeek.com/why-developers-are-ditching-github-for-codeberg-and-self-hosting-alternatives/", "source": "Hacker News", "apply": "Desenvolvedores procurando alternativas ao GitHub, organizações avaliando estratégias de hospedagem de código, provedores de plataformas de colaboração, pesquisadores de tendências em ferramentas de desenvolvimento, defensores do open-source", "score": 9.0, "conf": 95.0, "age": "há 9h", "category": "Geral"}, {"name": "Show HN: Microsoft releases Flint, a visualization language for AI agents", "desc": "Flint é uma linguagem de visualização criada pela Microsoft especificamente para agentes de IA, projetada para ajudá-los a gerar e interpretar representações visuais.", "url": "https://microsoft.github.io/flint-chart/#/", "source": "Hacker News", "apply": "depuração de agentes de IA, monitoramento do comportamento de agentes, explicação de decisões de IA, prototipagem de interfaces para agentes, análise de dados de agentes, controle de qualidade em sistemas multiagente", "score": 9.0, "conf": 95.0, "age": "há 9h", "category": "Geral"}, {"name": "John Deere owners will get the right to repair equipment under FTC settlement", "desc": "Geração de resumos concisos (1-2 frases), análise de engajamento e performance de conteúdo.", "url": "https://apnews.com/article/john-deere-right-to-repair-agriculture-equipment-cb7514ffedb95c130a976af661f2bc02", "source": "Hacker News", "apply": "Curadoria de notícias, marketing de conteúdo, otimização de títulos para mídias sociais, análise de tendências de popularidade.", "score": 9.0, "conf": 90.0, "age": "há 9h", "category": "Geral"}, {"name": "MadsLorentzen / ai-job-search", "desc": "Este é um framework de aplicação de emprego alimentado por IA, construído com base em Claude. Ele automatiza e otimiza a busca de trabalho, avaliando vagas, adaptando currículos, escrevendo cartas de apresentação e preparando para entrevistas.", "url": "https://github.com/MadsLorentzen/ai-job-search", "source": "GitHub Trending", "apply": "avaliação de vagas, adaptação de currículos, redação de cartas de apresentação, preparação para entrevistas", "score": 8.0, "conf": 95.0, "age": "agora", "category": "Produtividade"}, {"name": "Separating signal from noise in coding evaluations", "desc": "Um assistente de IA focado em aprimorar avaliações de código e desenvolvedores, identificando métricas de desempenho genuínas (o 'sinal') e descartando informações irrelevantes ou vieses subjetivos (o 'ruído').", "url": "https://openai.com/index/separating-signal-from-noise-coding-evaluations/", "source": "Hacker News", "apply": "Avaliação de candidatos em processos seletivos, revisões de desempenho de funcionários, otimização de processos de code review, identificação de padrões de código problemáticos, desenvolvimento de programas de treinamento personalizados", "score": 8.0, "conf": 75.0, "age": "há 9h", "category": "Geral"}, {"name": "Grok 4.5", "desc": "Grok 4.5 é um modelo de linguagem grande (LLM) conversacional, desenvolvido para dialogar, responder a perguntas e gerar conteúdo textual com uma personalidade distinta e, por vezes, irreverente.", "url": "https://x.ai/news/grok-4-5", "source": "Hacker News", "apply": "Resposta a perguntas, geração de texto criativo, sumarização de informações, assistência à programação, brainstorming, conversação geral, recuperação de dados, aprendizado", "score": 7.5, "conf": 75.0, "age": "há 9h", "category": "Geral"}, {"name": "Cloudflare Drop", "desc": "Cloudflare Drop é uma plataforma de IA que permite aos desenvolvedores integrar e executar modelos de inteligência artificial na infraestrutura de borda da Cloudflare, otimizando desempenho e escalabilidade para aplicações descentralizadas.", "url": "https://www.cloudflare.com/drop/", "source": "Hacker News", "apply": "desenvolvimento de aplicações de IA na borda, inferência de modelos em tempo real, processamento de dados distribuído, personalização de conteúdo dinâmica, segurança de aplicações com IA", "score": 7.0, "conf": 60.0, "age": "há 9h", "category": "Geral"}, {"name": "EU Parliament greenlights Chat Control 1.0 – Breyer: \"Our children lose out\"", "desc": "Chat Control 1.0 é uma medida legislativa aprovada pelo Parlamento Europeu que visa monitorar e controlar comunicações em chats online. Seu propósito declarado é a segurança, especialmente de crianças, mas a iniciativa gerou críticas intensas sobre a erosão da privacidade e os potenciais impactos negativos na liberdade.", "url": "https://www.patrick-breyer.de/en/eu-parliament-greenlights-chat-control-1-0-breyer-our-children-lose-out/", "source": "Hacker News", "apply": "monitoramento proativo de plataformas de mensagens, detecção de conteúdo ilegal (ex: abuso sexual infantil, grooming), aplicação de regulamentos de segurança digital em comunicações online, filtragem automatizada de conteúdo em larga escala.", "score": 3.0, "conf": 30.0, "age": "há 9h", "category": "Geral"}];
  const SRC_META = {"GitHub Trending": {"label": "GitHub", "cls": "src-github", "initials": "GI"}, "Hacker News": {"label": "HN", "cls": "src-hn", "initials": "HN"}, "Product Hunt": {"label": "PH", "cls": "src-ph", "initials": "PH"}};
  const SOURCE_ORDER = ["GitHub Trending", "Hacker News", "Product Hunt"];

  const search = document.getElementById('search');
  const pills = document.querySelectorAll('.pill-btn');
  const groupBtns = document.querySelectorAll('#groupSeg button');
  const groupsEl = document.getElementById('groups');
  const empty = document.getElementById('empty');
  let activeSrc = 'all';
  let groupBy = 'source';

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function cardHTML(it) {
    const meta = SRC_META[it.source] || { label: it.source, cls: 'src-github', initials: it.source.slice(0, 2).toUpperCase() };
    const isTop = it.score >= 9;
    return `
      <details class="card ${isTop ? 'top' : ''}" name="tile-group">
        <summary class="tile-face-bg">
          ${isTop ? '<span class="top-flag">Top</span>' : ''}
          <div class="avatar">${esc(meta.initials)}</div>
          <p class="face-name">${esc(it.name)}</p>
          <span class="score-chip">${it.score.toFixed(1)}</span>
          <p class="face-snippet">${esc(it.desc)}</p>
          <div class="face-foot">
            <span class="src-badge ${meta.cls}">${esc(meta.label)}</span>
            <span class="conf-mini">confiança ${it.conf}%</span>
          </div>
        </summary>
        <div class="tile-detail">
          <div class="detail-head">
            <div class="avatar">${esc(meta.initials)}</div>
            <div class="detail-head-text">
              <p class="detail-name">${esc(it.name)}</p>
              <span class="src-badge ${meta.cls}">${esc(meta.label)}</span>
              <span class="cat-chip">${esc(it.category)}</span>
            </div>
            <span class="score-chip">${it.score.toFixed(1)}</span>
          </div>
          <p class="card-desc">${esc(it.desc)}</p>
          <p class="apply"><b>Aplicável em</b>${esc(it.apply)}</p>
          <div class="card-foot">
            <span class="conf">confiança ${it.conf}% · ${esc(it.age)}</span>
            <a class="open-link" href="${esc(it.url)}" target="_blank" rel="noopener">Abrir ↗</a>
          </div>
        </div>
      </details>`;
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const filtered = DATA.filter(it =>
      (activeSrc === 'all' || it.source === activeSrc) &&
      (!q || it.name.toLowerCase().includes(q))
    );

    empty.style.display = filtered.length === 0 ? 'block' : 'none';

    const key = groupBy === 'source' ? 'source' : 'category';
    const groupsMap = {};
    filtered.forEach(it => { (groupsMap[it[key]] = groupsMap[it[key]] || []).push(it); });

    let groupKeys = Object.keys(groupsMap);
    if (groupBy === 'source') {
      groupKeys.sort((a, b) => SOURCE_ORDER.indexOf(a) - SOURCE_ORDER.indexOf(b));
    } else {
      groupKeys.sort((a, b) => groupsMap[b].length - groupsMap[a].length);
    }

    groupsEl.innerHTML = groupKeys.map(k => `
      <div class="group">
        <div class="group-head"><span class="group-title">${esc(k)}</span><span class="group-count">${groupsMap[k].length}</span></div>
        <div class="cards">${groupsMap[k].map(cardHTML).join('')}</div>
      </div>
    `).join('');
    armSlideListeners();
  }

  // painel de detalhe nasce em cima do card e desliza até o centro — calcula a distância quando abre
  function armSlide(card) {
    const r = card.getBoundingClientRect();
    const dx = (r.left + r.width / 2) - window.innerWidth / 2;
    const dy = (r.top + r.height / 2) - window.innerHeight / 2;
    card.style.setProperty('--dx', dx + 'px');
    card.style.setProperty('--dy', dy + 'px');
  }
  function armSlideListeners() {
    document.querySelectorAll('.card').forEach(c => {
      c.addEventListener('toggle', () => { if (c.open) armSlide(c); });
    });
  }

  search.addEventListener('input', render);
  pills.forEach(p => p.addEventListener('click', () => {
    pills.forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeSrc = p.dataset.src;
    render();
  }));
  groupBtns.forEach(b => b.addEventListener('click', () => {
    groupBtns.forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    groupBy = b.dataset.group;
    render();
  }));

  render();
</script>
</body>
</html>
