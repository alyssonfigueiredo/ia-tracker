<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IA Tracker</title>
<style>
  :root {
    --bg: #efe9da; --text: #241f18; --text-dim: #6b6152; --border: #e5dcc3;
    --accent: #c98f1d;
    --mono: ui-monospace, "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --rounded: ui-rounded, "SF Pro Rounded", var(--sans);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); padding: 28px 20px 64px; }
  .wrap { max-width: 1100px; margin: 0 auto; background: linear-gradient(135deg, #d9d7e2 0%, #f2ecdd 55%, #f6dfa0 100%);
    border-radius: 28px; padding: 28px; }

  .intro h1 { font-size: 1.6rem; margin: 0 0 6px; font-family: var(--rounded); }
  .intro p { margin: 0 0 20px; color: var(--text-dim); font-size: 0.9rem; }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
  .search { flex: 1; min-width: 180px; font-family: var(--sans); font-size: 0.86rem; background: #fff;
    border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; color: var(--text); outline: none; }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--text-dim); }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill-btn { font-family: var(--sans); font-size: 0.78rem; font-weight: 600; cursor: pointer; background: #fff;
    border: 1px solid var(--border); color: var(--text-dim); border-radius: 20px; padding: 6px 12px;
    display: flex; align-items: center; gap: 6px; }
  .pill-btn.active { background: var(--accent); color: var(--text); border-color: var(--accent); }
  .pill-btn .n { font-family: var(--mono); opacity: 0.75; }

  .group { margin-bottom: 26px; }
  .group-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; border-bottom: 1px dotted var(--text-dim); padding-bottom: 8px; }
  .group-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
  .group-count { font-family: var(--mono); font-size: 0.74rem; color: var(--text-dim); }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 16px; align-items: start; }

  /* .card é só um wrapper "neutro" no grid — precisa ficar livre de transform/filter/backdrop-filter,
     senão vira containing block e quebra o position:fixed do .tile-detail (isso já me mordeu uma vez aqui) */
  .card { position: relative; text-decoration: none; color: inherit; cursor: default; }

  .tile-face-bg { position: relative; background: rgba(255,255,255,0.55); border: 1px solid var(--border); border-radius: 28px;
    padding: 22px 18px; display: flex; flex-direction: column; align-items: center; text-align: center;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 4px 18px rgba(150,120,40,0.1);
    transition: box-shadow .3s, border-color .2s; }
  .card:hover .tile-face-bg, .card:focus-within .tile-face-bg { box-shadow: 0 10px 24px rgba(150,110,30,0.18); border-color: var(--accent); }
  .card.top .tile-face-bg { box-shadow: 0 0 0 1.5px var(--accent) inset; }

  /* fundo escurecido atrás do card em foco, só aparece durante o hover */
  .card::before {
    content: ""; position: fixed; inset: 0; background: rgba(30,24,10,0.28); backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 40;
  }
  .card:hover::before, .card:focus-within::before { opacity: 1; }

  .top-flag { position: absolute; top: -1px; right: 20px; background: var(--accent); color: #241f18; font-family: var(--mono);
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.04em; padding: 2px 7px; border-radius: 0 0 10px 10px; text-transform: uppercase; }

  .avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--accent) 22%, transparent); color: var(--accent); font-family: var(--rounded);
    font-weight: 700; font-size: 1rem; flex-shrink: 0; }

  .tile-face { display: flex; flex-direction: column; align-items: center; gap: 10px; transition: opacity .25s; }
  .card:hover .tile-face, .card:focus-within .tile-face { opacity: 0.3; }
  .card-name { font-family: var(--rounded); font-weight: 700; font-size: 1rem; margin: 0; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .score-chip { font-family: var(--mono); font-weight: 700; font-size: 0.76rem; padding: 3px 10px; border-radius: 999px;
    background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }

  /* detalhe voa pro centro da tela e amplia — texto ganha espaço em vez de ficar espremido na coluna */
  .tile-detail {
    position: fixed; top: 50%; left: 50%; width: min(460px, 88vw); max-height: 78vh; overflow-y: auto;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--border); border-radius: 28px; padding: 26px; text-align: left;
    box-shadow: 0 30px 60px rgba(60,45,10,0.28);
    transform: translate(-50%, -50%) scale(0.82); opacity: 0; pointer-events: none; z-index: 50;
    transition: transform .4s cubic-bezier(.16,1,.3,1), opacity .3s;
  }
  .card:hover .tile-detail, .card:focus-within .tile-detail { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }

  .detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .detail-head .avatar { width: 44px; height: 44px; font-size: 0.85rem; }
  .detail-head-text { flex: 1; min-width: 0; }
  .detail-name { font-family: var(--rounded); font-weight: 700; font-size: 1.1rem; margin: 0 0 6px; line-height: 1.3; }

  .src-badge { font-family: var(--mono); font-size: 0.64rem; padding: 2px 9px; border-radius: 20px; text-transform: uppercase;
    letter-spacing: 0.03em; }
  .src-github { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
  .src-hn { background: color-mix(in srgb, #b3503f 16%, transparent); color: #b3503f; }
  .src-ph { background: color-mix(in srgb, #5c8a55 16%, transparent); color: #5c8a55; }

  .card-desc { font-size: 0.88rem; color: var(--text-dim); line-height: 1.6; margin: 0 0 12px; }
  .apply { font-size: 0.82rem; line-height: 1.55; margin: 0; }
  .apply b { color: var(--text-dim); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 3px; }

  .card-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-top: 14px; margin-top: 14px; border-top: 1px dotted var(--border); }
  .conf { font-family: var(--mono); font-size: 0.74rem; color: var(--text-dim); }
  .open-link { font-family: var(--sans); font-size: 0.82rem; font-weight: 600; color: var(--accent); text-decoration: none; white-space: nowrap; }
  .open-link:hover { text-decoration: underline; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.86rem; display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="intro">
    <h1>IA Tracker</h1>
    <p>32 sinais coletados · GitHub Trending, Hacker News e Product Hunt.</p>
  </div>

  <div class="controls">
    <input class="search" id="search" type="text" placeholder="Buscar por nome...">
    <div class="pills" id="pills">
      <button class="pill-btn active" data-src="all">Todos <span class="n">32</span></button>
      <button class="pill-btn" data-src="GitHub Trending">GitHub <span class="n">10</span></button>
      <button class="pill-btn" data-src="Hacker News">HN <span class="n">22</span></button>
    </div>
  </div>

  <div id="groups"></div>
  <div class="empty" id="empty">Nenhum resultado — tenta outra busca ou fonte.</div>
</div>

<script>
  const DATA = [{"name": "Why developers are ditching GitHub for Codeberg and self-hosting alternatives", "desc": "Explora as razões pelas quais desenvolvedores estão migrando do GitHub para alternativas como Codeberg e soluções de auto-hospedagem, destacando questões de controle de dados e princípios open-source.", "url": "https://www.howtogeek.com/why-developers-are-ditching-github-for-codeberg-and-self-hosting-alternatives/", "source": "Hacker News", "apply": "Desenvolvedores procurando alternativas ao GitHub, organizações avaliando estratégias de hospedagem de código, provedores de plataformas de colaboração, pesquisadores de tendências em ferramentas de desenvolvimento, defensores do open-source", "score": 9.0, "conf": 95.0, "age": "há 6h"}, {"name": "Show HN: Microsoft releases Flint, a visualization language for AI agents", "desc": "Flint é uma linguagem de visualização criada pela Microsoft especificamente para agentes de IA, projetada para ajudá-los a gerar e interpretar representações visuais.", "url": "https://microsoft.github.io/flint-chart/#/", "source": "Hacker News", "apply": "depuração de agentes de IA, monitoramento do comportamento de agentes, explicação de decisões de IA, prototipagem de interfaces para agentes, análise de dados de agentes, controle de qualidade em sistemas multiagente", "score": 9.0, "conf": 95.0, "age": "há 6h"}, {"name": "John Deere owners will get the right to repair equipment under FTC settlement", "desc": "Geração de resumos concisos (1-2 frases), análise de engajamento e performance de conteúdo.", "url": "https://apnews.com/article/john-deere-right-to-repair-agriculture-equipment-cb7514ffedb95c130a976af661f2bc02", "source": "Hacker News", "apply": "Curadoria de notícias, marketing de conteúdo, otimização de títulos para mídias sociais, análise de tendências de popularidade.", "score": 9.0, "conf": 90.0, "age": "há 6h"}, {"name": "MadsLorentzen / ai-job-search", "desc": "Este é um framework de aplicação de emprego baseado em IA (Claude) que automatiza e personaliza o processo, avaliando vagas, adaptando currículos, escrevendo cartas de apresentação e preparando para entrevistas.", "url": "https://github.com/MadsLorentzen/ai-job-search", "source": "GitHub Trending", "apply": "Avaliação de vagas, adaptação de currículos, escrita de cartas de apresentação, preparação para entrevistas", "score": 8.0, "conf": 90.0, "age": "agora"}, {"name": "Separating signal from noise in coding evaluations", "desc": "Um assistente de IA focado em aprimorar avaliações de código e desenvolvedores, identificando métricas de desempenho genuínas (o 'sinal') e descartando informações irrelevantes ou vieses subjetivos (o 'ruído').", "url": "https://openai.com/index/separating-signal-from-noise-coding-evaluations/", "source": "Hacker News", "apply": "Avaliação de candidatos em processos seletivos, revisões de desempenho de funcionários, otimização de processos de code review, identificação de padrões de código problemáticos, desenvolvimento de programas de treinamento personalizados", "score": 8.0, "conf": 75.0, "age": "há 6h"}, {"name": "Grok 4.5", "desc": "Grok 4.5 é um modelo de linguagem grande (LLM) conversacional, desenvolvido para dialogar, responder a perguntas e gerar conteúdo textual com uma personalidade distinta e, por vezes, irreverente.", "url": "https://x.ai/news/grok-4-5", "source": "Hacker News", "apply": "Resposta a perguntas, geração de texto criativo, sumarização de informações, assistência à programação, brainstorming, conversação geral, recuperação de dados, aprendizado", "score": 7.5, "conf": 75.0, "age": "há 6h"}, {"name": "Cloudflare Drop", "desc": "Cloudflare Drop é uma plataforma de IA que permite aos desenvolvedores integrar e executar modelos de inteligência artificial na infraestrutura de borda da Cloudflare, otimizando desempenho e escalabilidade para aplicações descentralizadas.", "url": "https://www.cloudflare.com/drop/", "source": "Hacker News", "apply": "desenvolvimento de aplicações de IA na borda, inferência de modelos em tempo real, processamento de dados distribuído, personalização de conteúdo dinâmica, segurança de aplicações com IA", "score": 7.0, "conf": 60.0, "age": "há 6h"}, {"name": "EU Parliament greenlights Chat Control 1.0 – Breyer: \"Our children lose out\"", "desc": "Chat Control 1.0 é uma medida legislativa aprovada pelo Parlamento Europeu que visa monitorar e controlar comunicações em chats online. Seu propósito declarado é a segurança, especialmente de crianças, mas a iniciativa gerou críticas intensas sobre a erosão da privacidade e os potenciais impactos negativos na liberdade.", "url": "https://www.patrick-breyer.de/en/eu-parliament-greenlights-chat-control-1-0-breyer-our-children-lose-out/", "source": "Hacker News", "apply": "monitoramento proativo de plataformas de mensagens, detecção de conteúdo ilegal (ex: abuso sexual infantil, grooming), aplicação de regulamentos de segurança digital em comunicações online, filtragem automatizada de conteúdo em larga escala.", "score": 3.0, "conf": 30.0, "age": "há 6h"}, {"name": "ChatGPT Work", "desc": "Erro", "url": "https://openai.com/index/chatgpt-for-your-most-ambitious-work/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "Hy3", "desc": "Erro", "url": "https://hy.tencent.com/research/hy3", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "No leap second will be introduced at the end of December 2026", "desc": "Erro", "url": "https://datacenter.iers.org/data/latestVersion/bulletinC.txt", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "The glass backbone: Why the Army's logistics will break in the next war", "desc": "Erro", "url": "https://mwi.westpoint.edu/the-glass-backbone-why-the-armys-logistics-will-break-in-the-next-war/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "Muse Spark 1.1", "desc": "Erro", "url": "https://ai.meta.com/blog/introducing-muse-spark-meta-model-api/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "Meta reuses old RAM in new servers with custom bridge chip", "desc": "Erro", "url": "https://www.networkworld.com/article/4192827/meta-reuses-old-ram-in-new-servers-with-custom-bridge-chip.html", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "Spider venom kills varroa mites without harming honeybees", "desc": "Erro", "url": "https://connectsci.au/news/news-parent/9703/Spider-venom-kills-varroa-mites-without-harming", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "GPT-5.6", "desc": "Erro", "url": "https://openai.com/index/gpt-5-6/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "EU Parliament greenlights Chat Control 1.0", "desc": "Erro", "url": "https://www.patrick-breyer.de/en/eu-parliament-greenlights-chat-control-1-0-breyer-our-children-lose-out/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "Show HN: 18 Words", "desc": "Erro", "url": "https://18words.com/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "imthenachoman / How-To-Secure-A-Linux-Server", "desc": "Erro", "url": "https://github.com/imthenachoman/How-To-Secure-A-Linux-Server", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "unclecode / crawl4ai", "desc": "Erro", "url": "https://github.com/unclecode/crawl4ai", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "vxcontrol / pentagi", "desc": "Erro", "url": "https://github.com/vxcontrol/pentagi", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "anthropics / claude-cookbooks", "desc": "Erro", "url": "https://github.com/anthropics/claude-cookbooks", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "wonderwhy-er / DesktopCommanderMCP", "desc": "Erro", "url": "https://github.com/wonderwhy-er/DesktopCommanderMCP", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "iOfficeAI / OfficeCLI", "desc": "Erro", "url": "https://github.com/iOfficeAI/OfficeCLI", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "VoltAgent / awesome-design-md", "desc": "Erro", "url": "https://github.com/VoltAgent/awesome-design-md", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "addyosmani / agent-skills", "desc": "Erro", "url": "https://github.com/addyosmani/agent-skills", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "SmartlyDressedGames / U3-SDK", "desc": "Erro", "url": "https://github.com/SmartlyDressedGames/U3-SDK", "source": "GitHub Trending", "apply": "N/A", "score": 0, "conf": 0, "age": "agora"}, {"name": "AI content is everywhere on social media, especially LinkedIn", "desc": "Erro", "url": "https://www.pangram.com/blog/ai-in-your-feed", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "há 4h"}, {"name": "US seeks cheaper hunter-killer drones after Iran destroys $1B worth of Reapers", "desc": "Erro", "url": "https://arstechnica.com/gadgets/2026/07/us-seeks-cheaper-hunter-killer-drones-after-iran-destroys-1b-worth-of-reapers/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "há 4h"}, {"name": "Bonnie Tyler, singer of Total Eclipse of the Heart, dies aged 75", "desc": "Erro", "url": "https://www.bbc.com/news/articles/cg5pd9z2487o", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "há 6h"}, {"name": "Show HN: Yamanote.fun – A complete soundscape for Tokyo's Yamanote line", "desc": "Erro", "url": "https://www.yamanote.fun/", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "há 6h"}, {"name": "Rewriting Bun in Rust", "desc": "Erro", "url": "https://bun.com/blog/bun-in-rust", "source": "Hacker News", "apply": "N/A", "score": 0, "conf": 0, "age": "há 7h"}];
  const SRC_META = {"GitHub Trending": {"label": "GitHub", "cls": "src-github", "initials": "GI"}, "Hacker News": {"label": "HN", "cls": "src-hn", "initials": "HN"}, "Product Hunt": {"label": "PH", "cls": "src-ph", "initials": "PH"}};
  const SOURCE_ORDER = ["GitHub Trending", "Hacker News", "Product Hunt"];

  const search = document.getElementById('search');
  const pills = document.querySelectorAll('.pill-btn');
  const groupsEl = document.getElementById('groups');
  const empty = document.getElementById('empty');
  let activeSrc = 'all';

  function esc(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function cardHTML(it) {
    const meta = SRC_META[it.source] || { label: it.source, cls: 'src-github', initials: it.source.slice(0, 2).toUpperCase() };
    const isTop = it.score >= 9;
    return `
      <div class="card ${isTop ? 'top' : ''}" tabindex="0">
        <div class="tile-face-bg">
          ${isTop ? '<span class="top-flag">Top</span>' : ''}
          <div class="tile-face">
            <div class="avatar">${esc(meta.initials)}</div>
            <p class="card-name">${esc(it.name)}</p>
            <span class="score-chip">${it.score.toFixed(1)}</span>
          </div>
        </div>
        <div class="tile-detail">
          <div class="detail-head">
            <div class="avatar">${esc(meta.initials)}</div>
            <div class="detail-head-text">
              <p class="detail-name">${esc(it.name)}</p>
              <span class="src-badge ${meta.cls}">${esc(meta.label)}</span>
            </div>
            <span class="score-chip">${it.score.toFixed(1)}</span>
          </div>
          <p class="card-desc">${esc(it.desc)}</p>
          <p class="apply"><b>Aplicável em</b>${esc(it.apply)}</p>
          <div class="card-foot">
            <span class="conf">confiança ${it.conf}% · ${esc(it.age)}</span>
            <a class="open-link" href="${esc(it.url)}" target="_blank" rel="noopener">Abrir ↗</a>
          </div>
        </div>
      </div>`;
  }

  function render() {
    const q = search.value.trim().toLowerCase();
    const filtered = DATA.filter(it =>
      (activeSrc === 'all' || it.source === activeSrc) &&
      (!q || it.name.toLowerCase().includes(q))
    );

    empty.style.display = filtered.length === 0 ? 'block' : 'none';

    const groupsMap = {};
    filtered.forEach(it => { (groupsMap[it.source] = groupsMap[it.source] || []).push(it); });
    const groupKeys = Object.keys(groupsMap).sort((a, b) => SOURCE_ORDER.indexOf(a) - SOURCE_ORDER.indexOf(b));

    groupsEl.innerHTML = groupKeys.map(k => `
      <div class="group">
        <div class="group-head"><span class="group-title">${esc(k)}</span><span class="group-count">${groupsMap[k].length}</span></div>
        <div class="cards">${groupsMap[k].map(cardHTML).join('')}</div>
      </div>
    `).join('');
  }

  search.addEventListener('input', render);
  pills.forEach(p => p.addEventListener('click', () => {
    pills.forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    activeSrc = p.dataset.src;
    render();
  }));

  render();
</script>
</body>
</html>
